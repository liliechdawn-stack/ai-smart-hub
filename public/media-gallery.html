<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Powerhouse - Media Gallery & Activities</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Main Container */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .gallery-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: sticky;
            top: 1rem;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .header-top h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-stats {
            display: flex;
            gap: 2rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #666;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f0f0f0;
            color: #666;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-btn i {
            font-size: 1rem;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Search Bar */
        .search-bar {
            flex: 1;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 3rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-bar i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        /* Activity Section */
        .activity-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title i {
            color: #667eea;
        }

        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .activity-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
            border: 1px solid #e0e0e0;
        }

        .activity-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .activity-time {
            font-size: 0.75rem;
            color: #999;
        }

        /* Media Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .media-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            border: 2px solid transparent;
        }

        .media-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .media-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #999;
        }

        .media-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-info {
            padding: 1rem;
        }

        .media-type {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.9);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #667eea;
            backdrop-filter: blur(5px);
        }

        .media-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .media-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #999;
        }

        .media-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .media-card:hover .media-actions {
            opacity: 1;
        }

        .action-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
        }

        .play-btn {
            background: #667eea;
            color: white;
        }

        .play-btn:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        .download-btn {
            background: #48bb78;
            color: white;
        }

        .download-btn:hover {
            background: #38a169;
            transform: scale(1.05);
        }

        .delete-btn {
            background: #f56565;
            color: white;
        }

        .delete-btn:hover {
            background: #e53e3e;
            transform: scale(1.05);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .modal-content img,
        .modal-content video {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 10px;
        }

        .modal-content pre {
            background: #1e1e1e;
            color: #fff;
            padding: 2rem;
            border-radius: 10px;
            max-width: 800px;
            max-height: 80vh;
            overflow: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
        }

        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        /* Loading Spinner */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem;
            color: #999;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        /* Real-time Indicator */
        .realtime-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #f0f0f0;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.875rem;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: #48bb78;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery-container {
                padding: 1rem;
            }

            .header-top {
                flex-direction: column;
                gap: 1rem;
            }

            .header-stats {
                width: 100%;
                justify-content: space-around;
            }

            .filter-bar {
                flex-direction: column;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <!-- Header -->
        <div class="gallery-header">
            <div class="header-top">
                <h1><i class="fas fa-layer-group"></i> AI Powerhouse Media Gallery</h1>
                <div class="header-stats" id="mediaStats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalMedia">0</div>
                        <div class="stat-label">Total Items</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalImages">0</div>
                        <div class="stat-label">Images</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalScripts">0</div>
                        <div class="stat-label">Scripts</div>
                    </div>
                </div>
                <div class="realtime-indicator">
                    <span class="pulse"></span>
                    <span>Live Updates</span>
                </div>
            </div>

            <div class="filter-bar">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search media...">
                </div>
                <button class="filter-btn active" data-filter="all">
                    <i class="fas fa-th-large"></i> All
                </button>
                <button class="filter-btn" data-filter="image">
                    <i class="fas fa-image"></i> Images
                </button>
                <button class="filter-btn" data-filter="script">
                    <i class="fas fa-file-alt"></i> Scripts
                </button>
                <button class="filter-btn" data-filter="video">
                    <i class="fas fa-video"></i> Videos
                </button>
            </div>
        </div>

        <!-- Activity Section -->
        <div class="activity-section">
            <h2 class="section-title">
                <i class="fas fa-history"></i>
                Recent Activities
            </h2>
            <div class="activity-grid" id="activityGrid">
                <!-- Activities will be loaded here -->
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- Media Gallery Grid -->
        <div id="mediaGrid" class="gallery-grid">
            <!-- Media will be loaded here -->
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Media Modal -->
    <div class="modal" id="mediaModal">
        <div class="modal-content" id="modalContent">
            <!-- Content will be loaded here -->
        </div>
        <button class="close-modal" onclick="closeModal()">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <!-- Toast Notifications -->
    <div style="position: fixed; bottom: 2rem; right: 2rem; z-index: 1000;" id="toastContainer"></div>

    <script>
        // Configuration
        const API_BASE = '/api/powerhouse';
        const BACKEND_URL = 'https://ai-smart-hub.onrender.com';
        let currentFilter = 'all';
        let searchTerm = '';
        let mediaData = [];
        let activities = [];
        let socket = null;

        // Initialize Socket.io for real-time updates
        function initSocket() {
            try {
                socket = io({
                    path: '/socket.io',
                    transports: ['websocket', 'polling']
                });

                socket.on('connect', () => {
                    console.log('✅ Connected to real-time updates');
                    showToast('Connected to real-time updates', 'success');
                });

                socket.on('media_generated', (data) => {
                    console.log('📸 New media generated:', data);
                    loadMediaGallery();
                    loadActivities();
                    loadMediaStats();
                    showToast(`New ${data.type} generated!`, 'info');
                });

                socket.on('media_deleted', (data) => {
                    console.log('🗑️ Media deleted:', data);
                    loadMediaGallery();
                    loadActivities();
                    loadMediaStats();
                });

                socket.on('content_created', (data) => {
                    console.log('✍️ Content created:', data);
                    loadActivities();
                });

                socket.on('agent_deployed', (data) => {
                    console.log('🤖 Agent deployed:', data);
                    loadActivities();
                    showToast(`New agent deployed: ${data.agentType}`, 'success');
                });

                socket.on('alert', (data) => {
                    console.log('⚠️ Alert:', data);
                    showToast(data.title, 'warning');
                });

                socket.on('disconnect', () => {
                    console.log('❌ Disconnected from real-time updates');
                });
            } catch (error) {
                console.warn('Socket.io not available:', error);
            }
        }

        // Show toast notification
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                background: white;
                color: ${type === 'success' ? '#10b981' : type === 'warning' ? '#f59e0b' : '#3b82f6'};
                padding: 1rem 1.5rem;
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                margin-bottom: 1rem;
                animation: slideIn 0.3s ease;
                display: flex;
                align-items: center;
                gap: 0.5rem;
                font-weight: 500;
            `;

            const icon = document.createElement('i');
            icon.className = type === 'success' ? 'fas fa-check-circle' : 
                            type === 'warning' ? 'fas fa-exclamation-triangle' : 
                            'fas fa-info-circle';
            
            toast.appendChild(icon);
            toast.appendChild(document.createTextNode(message));

            document.getElementById('toastContainer').appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        // Add keyframe animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Load media gallery
        async function loadMediaGallery() {
            try {
                const response = await fetch(`${API_BASE}/media/gallery?limit=100`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load media');
                }

                const data = await response.json();
                mediaData = data.media || [];
                renderMediaGrid();
            } catch (error) {
                console.error('Error loading media:', error);
                showToast('Failed to load media gallery', 'error');
            }
        }

        // Render media grid with filters
        function renderMediaGrid() {
            const grid = document.getElementById('mediaGrid');
            
            let filteredMedia = mediaData;
            
            // Apply type filter
            if (currentFilter !== 'all') {
                filteredMedia = filteredMedia.filter(m => m.media_type === currentFilter);
            }
            
            // Apply search filter
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filteredMedia = filteredMedia.filter(m => 
                    (m.metadata?.prompt?.toLowerCase().includes(term)) ||
                    (m.metadata?.topic?.toLowerCase().includes(term)) ||
                    m.id.toLowerCase().includes(term)
                );
            }

            if (filteredMedia.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-images"></i>
                        <h3>No media found</h3>
                        <p>Try generating some content first!</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredMedia.map(media => `
                <div class="media-card" onclick="openMedia('${media.id}')">
                    <div class="media-type">
                        <i class="fas fa-${media.media_type === 'image' ? 'image' : media.media_type === 'video' ? 'video' : 'file-alt'}"></i>
                        ${media.media_type}
                    </div>
                    <div class="media-preview">
                        ${media.media_type === 'image' ? 
                            `<img src="${media.file_url}" alt="Generated image">` :
                          media.media_type === 'video' ?
                            `<video src="${media.file_url}"></video>` :
                            `<i class="fas fa-file-alt"></i>`
                        }
                    </div>
                    <div class="media-info">
                        <div class="media-title">
                            ${media.metadata?.prompt?.substring(0, 50) || 
                              media.metadata?.topic?.substring(0, 50) || 
                              `Generated ${media.media_type}`}
                            ${(media.metadata?.prompt?.length > 50 || media.metadata?.topic?.length > 50) ? '...' : ''}
                        </div>
                        <div class="media-meta">
                            <span><i class="far fa-clock"></i> ${formatDate(media.created_at)}</span>
                            <span><i class="far fa-eye"></i> ${media.views || 0}</span>
                        </div>
                        <div class="media-actions">
                            <button class="action-btn play-btn" onclick="event.stopPropagation(); openMedia('${media.id}')">
                                <i class="fas fa-play"></i> View
                            </button>
                            <button class="action-btn download-btn" onclick="event.stopPropagation(); downloadMedia('${media.file_url}')">
                                <i class="fas fa-download"></i>
                            </button>
                            <button class="action-btn delete-btn" onclick="event.stopPropagation(); deleteMedia('${media.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Load activities
        async function loadActivities() {
            try {
                const response = await fetch(`${API_BASE}/activity?limit=20`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load activities');
                }

                const data = await response.json();
                activities = data;
                renderActivities();
            } catch (error) {
                console.error('Error loading activities:', error);
            }
        }

        // Render activities
        function renderActivities() {
            const grid = document.getElementById('activityGrid');

            if (activities.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-history"></i>
                        <p>No recent activities</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = activities.map(activity => `
                <div class="activity-card">
                    <div class="activity-icon" style="background: ${activity.color}20; color: ${activity.color}">
                        <i class="fas ${activity.icon || 'fa-bell'}"></i>
                    </div>
                    <div class="activity-content">
                        <div class="activity-title">${activity.title}</div>
                        <div class="activity-time">${activity.time}</div>
                    </div>
                </div>
            `).join('');
        }

        // Load media stats
        async function loadMediaStats() {
            try {
                const response = await fetch(`${API_BASE}/media/stats`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load stats');
                }

                const data = await response.json();
                const stats = data.stats;

                document.getElementById('totalMedia').textContent = stats.total;
                document.getElementById('totalImages').textContent = stats.images;
                document.getElementById('totalScripts').textContent = stats.scripts;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Open media in modal
        async function openMedia(mediaId) {
            try {
                const response = await fetch(`${API_BASE}/media/${mediaId}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load media');
                }

                const data = await response.json();
                const media = data.media;
                const modal = document.getElementById('mediaModal');
                const modalContent = document.getElementById('modalContent');

                if (media.media_type === 'image') {
                    modalContent.innerHTML = `<img src="${media.file_url}" alt="Generated image">`;
                } else if (media.media_type === 'video') {
                    modalContent.innerHTML = `
                        <video controls autoplay>
                            <source src="${media.file_url}" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    `;
                } else {
                    // Fetch script content
                    const scriptResponse = await fetch(media.file_url);
                    const scriptContent = await scriptResponse.text();
                    modalContent.innerHTML = `<pre>${escapeHtml(scriptContent)}</pre>`;
                }

                modal.classList.add('active');
            } catch (error) {
                console.error('Error opening media:', error);
                showToast('Failed to open media', 'error');
            }
        }

        // Download media
        function downloadMedia(fileUrl) {
            window.open(fileUrl, '_blank');
        }

        // Delete media
        async function deleteMedia(mediaId) {
            if (!confirm('Are you sure you want to delete this media?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/media/${mediaId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to delete media');
                }

                showToast('Media deleted successfully', 'success');
                loadMediaGallery();
                loadMediaStats();
            } catch (error) {
                console.error('Error deleting media:', error);
                showToast('Failed to delete media', 'error');
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('mediaModal').classList.remove('active');
            document.getElementById('modalContent').innerHTML = '';
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} min ago`;
            
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return `${diffHours} hours ago`;
            
            const diffDays = Math.floor(diffHours / 24);
            return `${diffDays} days ago`;
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Event Listeners
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderMediaGrid();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderMediaGrid();
        });

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Close modal on click outside
        document.getElementById('mediaModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('mediaModal')) {
                closeModal();
            }
        });

        // Initialize
        async function init() {
            // Check authentication
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            // Load data
            await Promise.all([
                loadMediaGallery(),
                loadActivities(),
                loadMediaStats()
            ]);

            // Initialize socket
            initSocket();

            // Auto-refresh every 30 seconds
            setInterval(() => {
                loadActivities();
            }, 30000);
        }

        // Start
        init();
    </script>
</body>
</html>
